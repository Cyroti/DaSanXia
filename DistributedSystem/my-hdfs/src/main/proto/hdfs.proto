syntax = "proto3";

package hdfs;

option java_multiple_files = true;
option java_package = "com.example.hdfs.rpc";
option java_outer_classname = "HdfsProto";

enum OpenMode {
  OPEN_MODE_UNSPECIFIED = 0;
  READ = 1;
  WRITE = 2;
}

message BlockInfo {
  string block_id = 1;
  string datanode_id = 2;
  string datanode_address = 3;
  int32 size = 4;
}

message FileMetadata {
  string path = 1;
  int64 size = 2;
  int64 create_time = 3;
  int64 modify_time = 4;
  int64 access_time = 5;
  repeated BlockInfo blocks = 6;
}

message OpenRequest {
  string path = 1;
  OpenMode mode = 2;
}

message OpenResponse {
  bool success = 1;
  string message = 2;
  FileMetadata metadata = 3;
}

message CloseRequest {
  string path = 1;
}

message CloseResponse {
  bool success = 1;
  string message = 2;
}

message AllocateBlockRequest {
  string path = 1;
}

message AllocateBlockResponse {
  bool success = 1;
  string message = 2;
  BlockInfo block = 3;
}

message UpdateBlockRequest {
  string path = 1;
  string block_id = 2;
  string datanode_id = 3;
  string datanode_address = 4;
  int32 block_size = 5;
}

message UpdateBlockResponse {
  bool success = 1;
  string message = 2;
}

message ReadBlockRequest {
  string block_id = 1;
}

message ReadBlockResponse {
  bool success = 1;
  string message = 2;
  bytes data = 3;
}

message AppendBlockRequest {
  string block_id = 1;
  bytes data = 2;
}

message AppendBlockResponse {
  bool success = 1;
  string message = 2;
  int32 block_size = 3;
}

service NameNodeService {
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Close(CloseRequest) returns (CloseResponse);
  rpc AllocateBlock(AllocateBlockRequest) returns (AllocateBlockResponse);
  rpc UpdateBlock(UpdateBlockRequest) returns (UpdateBlockResponse);
}

service DataNodeService {
  rpc ReadBlock(ReadBlockRequest) returns (ReadBlockResponse);
  rpc AppendBlock(AppendBlockRequest) returns (AppendBlockResponse);
}
